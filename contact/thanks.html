<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #555555;
            background: #F5F7FA;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;

            padding: 40px 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 60px 48px;

            width: 100%;

        }
        .icon {
            font-size: 64px;
            color: #28A745;

        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #003366;
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 12px;
        }
        .note {
            background: #FFF9E6;
            border-left: 4px solid #FFCB05;
            padding: 16px 20px;
            border-radius: 4px;
            text-align: left;
            margin: 28px 0;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #003366;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover { background: #005A9C; }
    </style>

    <div class="card">

        <div class="note">

            お急ぎの場合はお電話ください：<strong>058-274-2332</strong>

        <a href="../index.html" class="btn"><i class="fas fa-home"></i> トップページへ戻る</a>
